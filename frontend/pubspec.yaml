name: docgen_vn
description: Hệ thống tự động sinh tài liệu mã nguồn Tiếng Việt
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (theme, auth token)
  shared_preferences: ^2.3.0

  # HTTP client cho gọi API
  http: ^1.2.2

  # Internationalization (date formatting)
  intl: ^0.20.2

  # Mở URL (trang tải xuống)
  url_launcher: ^6.3.0

  # File picker (để chọn file mã nguồn)
  file_picker: ^8.1.2

  # Charts (Admin dashboard)
  fl_chart: ^0.68.0

  # Markdown rendering (Doc output)
  flutter_markdown: ^0.7.3

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
